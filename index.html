<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Voice Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f7f6; }
        #game-area { position: relative; width: 600px; height: 300px; background: white; border: 3px dashed #ccc; border-radius: 15px; margin: 0 auto; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .box { position: absolute; top: 100px; width: 140px; height: 100px; line-height: 100px; font-size: 24px; font-weight: bold; border-radius: 10px; transition: all 1s ease; }
        #hint-box { left: 20px; background-color: #ffeaa7; color: #d63031; }
        #word-box { right: 20px; background-color: #81ecec; color: #0984e3; }
        button { margin-top: 30px; padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #00b894; color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #00cec9; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; color: #2d3436; }
    </style>
</head>
<body>

    <h2>🎤 เกมฝึกออกเสียงคำศัพท์</h2>
    
    <div id="game-area">
        <div id="hint-box" class="box">🍎 ผลไม้</div>
        <div id="word-box" class="box">Apple</div>
    </div>

    <button onclick="startListening()">กดปุ่มนี้แล้วพูดคำศัพท์ 🎤</button>
    <p id="status">รอกดปุ่มเพื่อเริ่มฟังเสียง...</p>

    <script>
        const hintBox = document.getElementById('hint-box');
        const wordBox = document.getElementById('word-box');
        const statusText = document.getElementById('status');
        const targetWord = "apple"; // คำศัพท์ที่ต้องการให้เด็กพูด

        function startListening() {
            // เช็คว่าบราวเซอร์รองรับระบบรับเสียงไหม
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusText.innerText = "❌ บราวเซอร์นี้ไม่รองรับระบบเสียง แนะนำให้ใช้ Google Chrome ครับ";
                statusText.style.color = "red";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // ตั้งค่าให้ฟังเสียงภาษาอังกฤษ

            recognition.onstart = function() {
                statusText.innerText = "🎧 กำลังฟัง... พูดคำว่า Apple เลย!";
                statusText.style.color = "#0984e3";
                // รีเซ็ตตำแหน่งกล่อง
                hintBox.style.left = "20px";
                wordBox.style.right = "20px";
            };

            recognition.onresult = function(event) {
                const spokenWord = event.results[0][0].transcript.toLowerCase().replace('.', '');
                
                if (spokenWord === targetWord) {
                    statusText.innerText = "🎉 ยอดเยี่ยม! คุณพูดว่า: " + spokenWord;
                    statusText.style.color = "#00b894";
                    // สั่งให้กล่องเลื่อนมาชนกันตรงกลาง
                    hintBox.style.left = "230px";
                    wordBox.style.right = "230px";
                } else {
                    statusText.innerText = "❌ เกือบแล้ว! คุณพูดว่า: " + spokenWord + " (ลองใหม่อีกครั้งนะ)";
                    statusText.style.color = "#d63031";
                    // สั่งให้กล่องเด้งกลับไปที่เดิม
                    hintBox.style.left = "20px";
                    wordBox.style.right = "20px";
                }
            };

            recognition.onerror = function(event) {
                statusText.innerText = "⚠️ ไม่ได้ยินเสียงครับ ลองกดพูดใหม่อีกครั้ง";
                statusText.style.color = "#d63031";
            };

            recognition.start();
        }
    </script>
</body>
</html>
