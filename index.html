<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Voice Game - M.1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 30px; background-color: #f4f7f6; }
        select { font-size: 18px; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 2px solid #0984e3; }
        #game-area { position: relative; width: 600px; height: 300px; background: white; border: 3px dashed #ccc; border-radius: 15px; margin: 0 auto; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .box { position: absolute; top: 100px; padding: 0 20px; height: 100px; line-height: 100px; font-size: 28px; font-weight: bold; border-radius: 10px; transition: all 0.8s ease; white-space: nowrap; }
        #hint-box { left: 20px; background-color: #ffeaa7; color: #d63031; }
        #word-box { right: 20px; background-color: #81ecec; color: #0984e3; }
        button { margin-top: 30px; padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #00b894; color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #00cec9; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; color: #2d3436; }
        #score-board { font-size: 24px; margin-bottom: 15px; color: #e17055; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🎤 เกมฝึกออกเสียงคำศัพท์ ม.1</h2>
    
    <select id="module-select" onchange="changeModule()">
        <option value="m4">Module 4: Family & Routines</option>
        <option value="m5">Module 5: Animals & Pets</option>
        <option value="m6">Module 6: Weather & Clothes</option>
        <option value="m7">Module 7: Jobs & Verbs</option>
        <option value="m8">Module 8: Food & Celebrations</option>
        <option value="m9">Module 9: Shops & Places</option>
        <option value="m10">Module 10: Holiday activities</option>
    </select>

    <div id="score-board">คะแนน: <span id="score">0</span></div>

    <div id="game-area">
        <div id="hint-box" class="box">เตรียมพร้อม</div>
        <div id="word-box" class="box">Ready</div>
    </div>

    <button onclick="startListening()">กดปุ่มแล้วเริ่มพูด 🎤</button>
    <p id="status">เลือกระดับชั้นแล้วกดปุ่มเพื่อเริ่มเลย!</p>

    <script>
        const vocabData = {
            m4: ["grandfather", "mother", "clever", "friendly", "have dinner", "get up"],
            m5: ["penguin", "polar bear", "tortoise", "butterfly", "mosquito", "rabbit"],
            m6: ["winter", "summer", "cloudy", "jacket", "trousers", "windsurf"],
            m7: ["scientist", "astronaut", "explorer", "manage", "travel", "succeed"],
            m8: ["biscuits", "pineapples", "potatoes", "cheese", "takeaway", "tomatoes"],
            m9: ["chemist", "bookshop", "museum", "comedy", "adventure", "motorbike"],
            m10: ["hiking", "sunbathing", "swimming", "fishing", "sailing", "souvenirs"]
        };

        let availableWords = [];
        let currentWord = "";
        let score = 0;
        let audioCtx;

        const hintBox = document.getElementById('hint-box');
        const wordBox = document.getElementById('word-box');
        const statusText = document.getElementById('status');
        const moduleSelect = document.getElementById('module-select');
        const scoreDisplay = document.getElementById('score');

        function playSound(type) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        // ฟังก์ชันโหลดคำศัพท์เมื่อเปลี่ยนหมวด
        function changeModule() {
            const selectedModule = moduleSelect.value;
            // ดึงคำศัพท์ทั้งหมดในหมวดนั้นมาใส่กล่องจับฉลาก
            availableWords = [...vocabData[selectedModule]]; 
            loadNewWord();
        }

        function loadNewWord() {
            // ถ้ารอบนี้คำศัพท์หมดแล้ว ให้เติมคำศัพท์กลับเข้าไปใหม่
            if (availableWords.length === 0) {
                const selectedModule = moduleSelect.value;
                availableWords = [...vocabData[selectedModule]];
                statusText.innerText = "🎉 เก่งมาก! จบหมวดแล้ว เริ่มวนคำศัพท์รอบใหม่";
            }

            // สุ่มหยิบ 1 คำจากคำที่ยังเหลืออยู่
            const randomIndex = Math.floor(Math.random() * availableWords.length);
            currentWord = availableWords[randomIndex];
            
            hintBox.innerText = "พูดคำนี้ 👉";
            wordBox.innerText = currentWord;
            
            hintBox.style.left = "20px";
            wordBox.style.right = "20px";
            
            if (statusText.innerText.indexOf("จบหมวด") === -1) {
                statusText.innerText = "กดไมค์แล้วพูดคำว่า: " + currentWord;
            }
            statusText.style.color = "#2d3436";
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusText.innerText = "❌ บราวเซอร์ไม่รองรับ แนะนำให้ใช้ Google Chrome ครับ";
                return;
            }

            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                statusText.innerText = "🎧 กำลังฟัง... พูดเลย!";
                statusText.style.color = "#0984e3";
                hintBox.style.left = "20px";
                wordBox.style.right = "20px";
            };

            recognition.onresult = function(event) {
                const spokenWord = event.results[0][0].transcript.toLowerCase().replace(/[^a-z\s]/g, '').trim();
                const targetWord = currentWord.toLowerCase().trim();
                
                if (spokenWord === targetWord) {
                    playSound('success');
                    statusText.innerText = "🎉 ยอดเยี่ยม! เปลี่ยนคำต่อไป...";
                    statusText.style.color = "#00b894";
                    hintBox.style.left = "180px"; 
                    wordBox.style.right = "180px";
                    
                    score += 10;
                    scoreDisplay.innerText = score;

                    // ตัดคำที่พูดถูกออกไปจากกองฉลาก
                    availableWords = availableWords.filter(word => word !== currentWord);

                    setTimeout(loadNewWord, 2000);
                } else {
                    playSound('error');
                    statusText.innerText = "❌ ได้ยินว่า: " + spokenWord + " (ลองใหม่นะ)";
                    statusText.style.color = "#d63031";
                    // ถ้าผิด คำจะยังอยู่ในกองเหมือนเดิม ให้ลองกดพูดแก้ตัวใหม่ได้เลย
                }
            };

            recognition.onerror = function() {
                statusText.innerText = "⚠️ ไม่ได้ยินเสียงครับ ลองกดพูดอีกครั้ง";
            };

            recognition.start();
        }

        window.onload = changeModule;
    </script>
</body>
</html>
