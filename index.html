<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Voice Game - M.1</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 30px; background-color: #f4f7f6; }
        select { font-size: 18px; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 2px solid #0984e3; }
        
        #game-area { width: 600px; height: 300px; background: white; border: 3px dashed #ccc; border-radius: 15px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        #top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #636e72; }
        #word-display { font-size: 65px; font-weight: bold; color: #0984e3; margin: 0; }
        
        .btn-group { margin-top: 30px; }
        button { padding: 12px 20px; font-size: 18px; cursor: pointer; color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 8px; transition: 0.2s; }
        
        .btn-mic { background-color: #00b894; padding: 15px 30px; font-size: 20px; }
        .btn-mic:hover { background-color: #00cec9; transform: scale(1.05); }
        .btn-speak { background-color: #0984e3; }
        .btn-speak:hover { background-color: #74b9ff; }
        .btn-restart { background-color: #e17055; }
        .btn-restart:hover { background-color: #fab1a0; }
        
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; color: #2d3436; height: 30px; }
        .score-text { color: #e17055; }
    </style>
</head>
<body>

    <h2>🎤 เกมฝึกออกเสียงคำศัพท์ ม.1</h2>
    
    <select id="module-select" onchange="startGame()">
        <option value="m4">Module 4: Family & Routines</option>
        <option value="m5">Module 5: Animals & Pets</option>
        <option value="m6">Module 6: Weather & Clothes</option>
        <option value="m7">Module 7: Jobs & Verbs</option>
        <option value="m8">Module 8: Food & Celebrations</option>
        <option value="m9">Module 9: Shops & Places</option>
        <option value="m10">Module 10: Holiday activities</option>
    </select>

    <div id="game-area">
        <div id="top-bar">
            <span>คำที่: <span id="progress">0/0</span></span>
            <span class="score-text">คะแนน: <span id="score">0</span></span>
        </div>
        <div id="word-display">Ready</div>
    </div>

    <div class="btn-group">
        <button class="btn-restart" onclick="startGame()">🔄 เริ่มเกมใหม่</button>
        <button class="btn-speak" onclick="playExample()">🔊 ฟังตัวอย่าง</button>
        <button class="btn-mic" onclick="startListening()">🎤 กดแล้วพูด</button>
    </div>
    
    <p id="status">เลือกระดับชั้นแล้วกดปุ่มเพื่อเริ่มเลย!</p>

    <script>
        const vocabData = {
            m4: ["grandfather", "mother", "clever", "friendly", "have dinner", "get up"],
            m5: ["penguin", "polar bear", "tortoise", "butterfly", "mosquito", "rabbit"],
            m6: ["winter", "summer", "cloudy", "jacket", "trousers", "windsurf"],
            m7: ["scientist", "astronaut", "explorer", "manage", "travel", "succeed"],
            m8: ["biscuits", "pineapples", "potatoes", "cheese", "takeaway", "tomatoes"],
            m9: ["chemist", "bookshop", "museum", "comedy", "adventure", "motorbike"],
            m10: ["hiking", "sunbathing", "swimming", "fishing", "sailing", "souvenirs"]
        };

        let currentModuleWords = [];
        let wordIndex = 0;
        let score = 0;
        let audioCtx;

        const wordDisplay = document.getElementById('word-display');
        const statusText = document.getElementById('status');
        const moduleSelect = document.getElementById('module-select');
        const scoreDisplay = document.getElementById('score');
        const progressDisplay = document.getElementById('progress');

        // ฟังก์ชันสับเปลี่ยนลำดับคำศัพท์ (Shuffle) แบบสุ่ม
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function playSound(type) {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function playExample() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentModuleWords[wordIndex]);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("เบราว์เซอร์ไม่รองรับระบบอ่านออกเสียงครับ");
            }
        }

        // เริ่มเกมใหม่ ดึงคำศัพท์มาสับไพ่ รีเซ็ตคะแนน
        function startGame() {
            const selectedModule = moduleSelect.value;
            // ก๊อปปี้คำศัพท์มาแล้วสับลำดับใหม่
            currentModuleWords = shuffleArray([...vocabData[selectedModule]]);
            wordIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            showWord();
        }

        function showWord() {
            if (wordIndex >= currentModuleWords.length) {
                wordDisplay.innerText = "🎉 จบเกม!";
                statusText.innerText = "เก่งมาก! ทำครบทุกคำในบทนี้แล้ว";
                statusText.style.color = "#00b894";
                progressDisplay.innerText = currentModuleWords.length + "/" + currentModuleWords.length;
                return;
            }

            wordDisplay.innerText = currentModuleWords[wordIndex];
            progressDisplay.innerText = (wordIndex + 1) + "/" + currentModuleWords.length;
            statusText.innerText = "กดไมค์แล้วพูดคำว่า: " + currentModuleWords[wordIndex];
            statusText.style.color = "#2d3436";
        }

        function startListening() {
            if (wordIndex >= currentModuleWords.length) return; // ถ้าจบเกมแล้วกดไมค์ไม่ได้

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusText.innerText = "❌ บราวเซอร์ไม่รองรับ แนะนำให้ใช้ Google Chrome ครับ";
                return;
            }

            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                statusText.innerText = "🎧 กำลังฟัง... พูดเลย!";
                statusText.style.color = "#0984e3";
            };

            recognition.onresult = function(event) {
                const spokenWord = event.results[0][0].transcript.toLowerCase().replace(/[^a-z\s]/g, '').trim();
                const targetWord = currentModuleWords[wordIndex].toLowerCase().trim();
                
                if (spokenWord === targetWord) {
                    playSound('success');
                    // ยิงพลุกระดาษฉลอง
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    
                    statusText.innerText = "🎉 ยอดเยี่ยม! เปลี่ยนคำต่อไป...";
                    statusText.style.color = "#00b894";
                    
                    score += 10;
                    scoreDisplay.innerText = score;
                    wordIndex++; // เลื่อนไปคำถัดไป

                    setTimeout(showWord, 2000);
                } else {
                    playSound('error');
                    statusText.innerText = "❌ ได้ยินว่า: " + spokenWord + " (ลองฟังตัวอย่างแล้วพูดใหม่นะ)";
                    statusText.style.color = "#d63031";
                }
            };

            recognition.onerror = function() {
                statusText.innerText = "⚠️ ไม่ได้ยินเสียงครับ ลองกดพูดอีกครั้ง";
            };

            recognition.start();
        }

        // โหลดเกมครั้งแรกเมื่อเปิดเว็บ
        window.onload = startGame;
    </script>
</body>
</html>
